<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What to Watch – Yahoo</title>
  <link rel="stylesheet" href="/css/fonts.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/grid.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/hero.css">
  <link rel="stylesheet" href="/css/cards.css">
  <link rel="stylesheet" href="/css/sections.css">
</head>
<body>

  <!-- ── Navigation – Figma 18913:161331 (SYC Header) ── -->
  <header class="nav-header">
    <div class="nav-inner">
      <!-- Top row: logo + search + nav icons -->
      <div class="nav-top">
        <div class="nav-front">
          <a href="/" class="nav-logo">
            <img src="/assets/yahoo-logo.svg" alt="Yahoo" width="86" height="24">
          </a>

          <div class="nav-search-wrap">
            <div class="nav-search-box">
              <div class="nav-search-inner">
                <div class="nav-search-text">
                  <input type="text" id="searchInput" placeholder="What to watch" autocomplete="off">
                </div>
                <div class="nav-search-end">
                  <button class="nav-clear-btn" id="clearBtn" aria-label="Clear" style="display:none">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
                  </button>
                  <div class="nav-search-icons">
                    <button class="nav-icon-btn" aria-label="Voice search">
                      <img src="/assets/mic.svg" alt="" width="16" height="16">
                    </button>
                    <button class="nav-icon-btn" id="searchBtn" aria-label="Search">
                      <img src="/assets/search.svg" alt="" width="16" height="16">
                    </button>
                    <div class="nav-search-divider"></div>
                  </div>
                  <button class="nav-scout-btn" aria-label="Yahoo Scout">
                    <img src="/assets/scout.svg" alt="Scout" width="20" height="20">
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="nav-actions">
          <button class="nav-icon-btn" aria-label="Apps">
            <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="3" cy="3" r="1.5"/><circle cx="8" cy="3" r="1.5"/><circle cx="13" cy="3" r="1.5"/><circle cx="3" cy="8" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="13" cy="8" r="1.5"/><circle cx="3" cy="13" r="1.5"/><circle cx="8" cy="13" r="1.5"/><circle cx="13" cy="13" r="1.5"/></svg>
          </button>
          <button class="nav-icon-btn" aria-label="Inbox">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="2" y="3" width="12" height="10" rx="1.5"/><polyline points="2,5 8,9 14,5"/></svg>
          </button>
        </div>
      </div>

      <!-- Tab bar -->
      <div class="nav-tabs-row">
        <div class="nav-tabs" id="navTabs">
          <a href="#" class="nav-scout-link">
            <img src="/assets/scout-sm.svg" alt="" width="16" height="16">
            Yahoo Scout
          </a>
          <button class="nav-tab is-selected" data-tab="all">All</button>
          <button class="nav-tab" data-tab="images">Images</button>
          <button class="nav-tab" data-tab="videos">Videos</button>
          <button class="nav-tab" data-tab="news">News</button>
          <button class="nav-tab" data-tab="local">Local</button>
          <button class="nav-tab-dropdown" aria-label="Time filter">
            Anytime
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,6 8,10 12,6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Mobile genre bar ── -->
  <div class="mobile-genre-bar" id="mobileGenreBar"></div>

  <!-- ── Main content ── -->
  <main>
    <!-- Hero / Featured -->
    <div class="grid">
      <div class="hero" id="heroSection">
        <img class="hero-backdrop" id="heroBackdrop" src="" alt="">
        <div class="hero-gradient"></div>
        <div class="hero-content">
          <span class="hero-badge" id="heroBadge">Featured</span>
          <h1 class="hero-title" id="heroTitle"></h1>
          <div class="hero-meta" id="heroMeta"></div>
          <p class="hero-description" id="heroDescription"></p>
          <div class="hero-actions">
            <button class="hero-btn hero-btn-primary" id="heroWatchBtn">
              <svg viewBox="0 0 16 16" fill="currentColor"><polygon points="4,2 14,8 4,14"/></svg>
              Where to Watch
            </button>
            <button class="hero-btn hero-btn-secondary" id="heroInfoBtn">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="7" x2="8" y2="11"/><circle cx="8" cy="5" r="0.5" fill="currentColor"/></svg>
              More Info
            </button>
          </div>
        </div>
        <div class="hero-dots" id="heroDots"></div>
      </div>
    </div>

    <!-- Genre chips (desktop) -->
    <div class="grid desktop-genre-bar">
      <div class="genre-bar" id="genreBar"></div>
    </div>

    <!-- Content sections -->
    <div class="grid">
      <div id="contentSections"></div>
    </div>

    <!-- Footer -->
    <div class="grid">
      <footer class="page-footer">
        <p class="footer-text">Powered by Yahoo · Prototype</p>
        <div class="footer-links">
          <a href="#" class="footer-link">Privacy</a>
          <a href="#" class="footer-link">Terms</a>
          <a href="#" class="footer-link">About</a>
        </div>
      </footer>
    </div>
  </main>

  <!-- ── Detail overlay ── -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-backdrop" id="detailBackdrop"></div>
    <div class="detail-modal">
      <div class="detail-hero">
        <img id="detailImage" src="" alt="">
        <div class="detail-hero-gradient"></div>
        <button class="detail-close" id="detailClose">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
        </button>
      </div>
      <div class="detail-body">
        <h2 class="detail-title" id="detailTitle"></h2>
        <div class="detail-meta" id="detailMeta"></div>
        <p class="detail-description" id="detailDescription"></p>
        <div class="detail-streaming" id="detailStreaming"></div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
