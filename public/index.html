<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What to Watch – Yahoo</title>
  <link rel="stylesheet" href="/css/fonts.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/grid.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/hero.css">
  <link rel="stylesheet" href="/css/cards.css">
  <link rel="stylesheet" href="/css/sections.css">
</head>
<body>

  <!-- ── Navigation ── -->
  <header class="nav-header">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <span class="nav-logo-text">What to Watch</span>
      </a>

      <div class="nav-search-wrap">
        <div class="nav-search-box">
          <div class="nav-search-inner">
            <input type="text" id="searchInput" placeholder="Search movies & shows..." autocomplete="off">
            <button class="nav-search-btn" id="searchBtn" aria-label="Search">
              <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="nav-actions">
        <div class="nav-filter-chips">
          <button class="nav-filter-chip active" data-type="">All</button>
          <button class="nav-filter-chip" data-type="movie">Movies</button>
          <button class="nav-filter-chip" data-type="series">TV Shows</button>
        </div>
        <div class="nav-avatar" title="Profile">Y</div>
      </div>
    </div>
  </header>

  <!-- ── Mobile genre bar ── -->
  <div class="mobile-genre-bar" id="mobileGenreBar"></div>

  <!-- ── Main content ── -->
  <main>
    <!-- Hero / Featured -->
    <div class="grid">
      <div class="hero" id="heroSection">
        <img class="hero-backdrop" id="heroBackdrop" src="" alt="">
        <div class="hero-gradient"></div>
        <div class="hero-content">
          <span class="hero-badge" id="heroBadge">Featured</span>
          <h1 class="hero-title" id="heroTitle"></h1>
          <div class="hero-meta" id="heroMeta"></div>
          <p class="hero-description" id="heroDescription"></p>
          <div class="hero-actions">
            <button class="hero-btn hero-btn-primary" id="heroWatchBtn">
              <svg viewBox="0 0 16 16" fill="currentColor"><polygon points="4,2 14,8 4,14"/></svg>
              Where to Watch
            </button>
            <button class="hero-btn hero-btn-secondary" id="heroInfoBtn">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="7" x2="8" y2="11"/><circle cx="8" cy="5" r="0.5" fill="currentColor"/></svg>
              More Info
            </button>
          </div>
        </div>
        <div class="hero-dots" id="heroDots"></div>
      </div>
    </div>

    <!-- Genre chips (desktop) -->
    <div class="grid desktop-genre-bar">
      <div class="genre-bar" id="genreBar"></div>
    </div>

    <!-- Content sections -->
    <div class="grid">
      <div id="contentSections"></div>
    </div>

    <!-- Footer -->
    <div class="grid">
      <footer class="page-footer">
        <p class="footer-text">Powered by Yahoo · Prototype</p>
        <div class="footer-links">
          <a href="#" class="footer-link">Privacy</a>
          <a href="#" class="footer-link">Terms</a>
          <a href="#" class="footer-link">About</a>
        </div>
      </footer>
    </div>
  </main>

  <!-- ── Detail overlay ── -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-backdrop" id="detailBackdrop"></div>
    <div class="detail-modal">
      <div class="detail-hero">
        <img id="detailImage" src="" alt="">
        <div class="detail-hero-gradient"></div>
        <button class="detail-close" id="detailClose">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
        </button>
      </div>
      <div class="detail-body">
        <h2 class="detail-title" id="detailTitle"></h2>
        <div class="detail-meta" id="detailMeta"></div>
        <p class="detail-description" id="detailDescription"></p>
        <div class="detail-streaming" id="detailStreaming"></div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
